name: Java CI con Maven

# 1. Eventos que lanzan el workflow
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # 2. Máquina virtual donde se ejecutará
    runs-on: ubuntu-latest

    steps:
      # 3. Descargar el proyecto
      - name: Obtener el código
        uses: actions/checkout@v4

      # 4. Configurar Java 17
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Optimiza las descargas de dependencias

      # 5. Ejecutar las pruebas Maven
      - name: Compilar y ejecutar pruebas
        run: mvn clean test
